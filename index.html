<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown Viewer</title>

  <!-- Markdown Parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fa;
    }

    header {
      background: #0d1117;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 20px auto;
    }

    input {
      width: 75%;
      padding: 10px;
      font-size: 14px;
    }

    button {
      padding: 10px 15px;
      background: #0969da;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #content {
      background: white;
      padding: 25px;
      border-radius: 10px;
      margin-top: 20px;
    }

    pre {
      background: #0d1117;
      color: #c9d1d9;
      padding: 12px;
      overflow-x: auto;
    }
  </style>
</head>
<body>

<header>
  <h1>Markdown Viewer</h1>
  <p>Render any GitHub .md file</p>
</header>

<div class="container">

  <input id="mdUrl" placeholder="Paste GitHub .md link here">
  <button onclick="loadMD()">Load</button>

  <div id="content">Markdown content will appear here</div>

</div>

<script>
function convertToRaw(url) {
  if (url.includes("github.com") && url.includes("/blob/")) {
    return url
      .replace("https://github.com/", "https://raw.githubusercontent.com/")
      .replace("/blob/", "/");
  }
  return url;
}

async function loadMD() {
  const url = document.getElementById("mdUrl").value;
  const rawUrl = convertToRaw(url);

  const res = await fetch(rawUrl);
  const text = await res.text();

  document.getElementById("content").innerHTML = marked.parse(text);
}
</script>

</body>
</html>

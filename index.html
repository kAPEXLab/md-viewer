<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer Test</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f6f8fa;
      color: #24292f;
    }

    #status {
      background: #fff8c5;
      border: 1px solid #eac54f;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    #content {
      background: white;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 20px;
    }

    pre {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      padding: 12px;
      overflow-x: auto;
      border-radius: 6px;
    }

    code {
      background: #f6f8fa;
      padding: 2px 4px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>Viewer Test</h1>
  <div id="status">Starting...</div>
  <div id="content">Waiting to load markdown...</div>

  <script>
    const statusEl = document.getElementById("status");
    const contentEl = document.getElementById("content");

    function setStatus(msg) {
      statusEl.textContent = msg;
      console.log(msg);
    }

    async function run() {
      try {
        setStatus("Step 1: Fetching link.txt ...");

        const linkUrl = "https://raw.githubusercontent.com/kAPEXLab/md-config/main/link.txt?t=" + Date.now();
        const linkResp = await fetch(linkUrl, { cache: "no-store" });

        if (!linkResp.ok) {
          throw new Error("link.txt fetch failed: " + linkResp.status);
        }

        const mdUrl = (await linkResp.text()).trim();
        setStatus("Step 2: link.txt loaded\n" + mdUrl);

        const sep = mdUrl.includes("?") ? "&" : "?";
        const mdResp = await fetch(mdUrl + sep + "t=" + Date.now(), { cache: "no-store" });

        if (!mdResp.ok) {
          throw new Error("Markdown fetch failed: " + mdResp.status);
        }

        const mdText = await mdResp.text();
        setStatus("Step 3: Markdown fetched successfully\nLength = " + mdText.length);

        contentEl.innerHTML = marked.parse(mdText);
      } catch (err) {
        setStatus("ERROR:\n" + err.message);
        contentEl.textContent = "Load failed. Check browser console.";
        console.error(err);
      }
    }

    run();
  </script>
</body>
</html>
